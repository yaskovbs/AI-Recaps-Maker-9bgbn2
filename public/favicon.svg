      <stop offset="50%" style="stop-color:#1a1145"/>
      <stop offset="100%" style="stop-color:#0f1a3a"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
