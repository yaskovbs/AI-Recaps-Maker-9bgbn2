services:
  processor:
    build: .
    init: true
    restart: unless-stopped
    env_file: .env
    volumes:
      - whisper-cache:/home/worker/.cache
    security_opt:
      - no-new-privileges:true
    stop_grace_period: 30s
    deploy:
      resources:
        limits:
          memory: 8G

volumes:
  whisper-cache:
