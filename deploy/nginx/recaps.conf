server {
    server_name making-a-recap-with-ai.com www.making-a-recap-with-ai.com 72.61.101.138 _;
    root /var/www/recaps/current;
    index index.html;

    access_log /var/log/nginx/recaps.access.log;
    error_log /var/log/nginx/recaps.error.log;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location ~* \.(?:css|js|mjs|jpg|jpeg|gif|png|svg|ico|webp|avif|woff2?|ttf|eot)$ {
        try_files $uri =404;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    listen [::]:443 ssl ipv6only=on; # managed by Certbot
    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/making-a-recap-with-ai.com/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/making-a-recap-with-ai.com/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot
}

server {
    if ($host = www.making-a-recap-with-ai.com) {
        return 301 https://$host$request_uri;
    } # managed by Certbot

    if ($host = making-a-recap-with-ai.com) {
        return 301 https://$host$request_uri;
    } # managed by Certbot

    listen 80 default_server;
    listen [::]:80 default_server;

    server_name making-a-recap-with-ai.com www.making-a-recap-with-ai.com 72.61.101.138 _;
    return 404; # managed by Certbot
}
