server {
    listen 80 default_server;
    listen [::]:80 default_server;

    server_name making-a-recap-with-ai.com www.making-a-recap-with-ai.com 72.61.101.138 _;
    root /var/www/recaps/current;
    index index.html;

    access_log /var/log/nginx/recaps.access.log;
    error_log /var/log/nginx/recaps.error.log;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location ~* \.(?:css|js|mjs|jpg|jpeg|gif|png|svg|ico|webp|avif|woff2?|ttf|eot)$ {
        try_files $uri =404;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }
}
