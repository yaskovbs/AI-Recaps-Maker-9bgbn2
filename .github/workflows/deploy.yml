name: Deploy to Hostinger

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      HOSTINGER_SSH_HOST: 72.61.101.138
      HOSTINGER_SSH_PORT: 22
      HOSTINGER_SSH_USER: deploy
      HOSTINGER_DEPLOY_PATH: /var/www/recaps/current/

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Detect Supabase deployment mode
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_ID: ${{ secrets.SUPABASE_PROJECT_ID || secrets.SUPABASE_PROJECT_REF || secrets.PRODUCTION_PROJECT_ID || secrets.PRODUCTION_PROJECT_REF }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD || secrets.PRODUCTION_DB_PASSWORD }}
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL || secrets.SUPABASE_DATABASE_URL || secrets.DATABASE_URL }}
        run: |
          if [ -n "$SUPABASE_DB_URL" ]; then
            echo "SUPABASE_DEPLOY_MODE=postgres" >> "$GITHUB_ENV"
            echo "Using direct Postgres URL for database migrations."
          elif [ -n "$SUPABASE_ACCESS_TOKEN" ] && [ -n "$SUPABASE_PROJECT_ID" ] && [ -n "$SUPABASE_DB_PASSWORD" ]; then
            echo "SUPABASE_DEPLOY_MODE=supabase_cli" >> "$GITHUB_ENV"
            echo "Using Supabase CLI for database migrations."
          else
            echo "SUPABASE_DEPLOY_MODE=skip" >> "$GITHUB_ENV"
            echo "::warning::Database migrations skipped. Add SUPABASE_DB_URL, or add SUPABASE_ACCESS_TOKEN, SUPABASE_PROJECT_ID, and SUPABASE_DB_PASSWORD."
          fi

          if [ -n "$SUPABASE_ACCESS_TOKEN" ] && [ -n "$SUPABASE_PROJECT_ID" ]; then
            echo "SUPABASE_FUNCTIONS_ENABLED=true" >> "$GITHUB_ENV"
          else
            echo "SUPABASE_FUNCTIONS_ENABLED=false" >> "$GITHUB_ENV"
            echo "::warning::Edge Function deployment skipped. Add SUPABASE_ACCESS_TOKEN and SUPABASE_PROJECT_ID."
          fi

      - name: Push Supabase migrations with CLI
        if: env.SUPABASE_DEPLOY_MODE == 'supabase_cli'
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_ID: ${{ secrets.SUPABASE_PROJECT_ID || secrets.SUPABASE_PROJECT_REF || secrets.PRODUCTION_PROJECT_ID || secrets.PRODUCTION_PROJECT_REF }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD || secrets.PRODUCTION_DB_PASSWORD }}
        run: |
          supabase link --project-ref "$SUPABASE_PROJECT_ID"
          supabase db push

      - name: Push Supabase migrations with Postgres URL
        if: env.SUPABASE_DEPLOY_MODE == 'postgres'
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL || secrets.SUPABASE_DATABASE_URL || secrets.DATABASE_URL }}
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-client
          for migration in supabase/migrations/*.sql; do
            echo "Applying $migration"
            psql "$SUPABASE_DB_URL" -v ON_ERROR_STOP=1 -f "$migration"
          done

      - name: Deploy Supabase Edge Functions
        if: env.SUPABASE_FUNCTIONS_ENABLED == 'true'
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_ID: ${{ secrets.SUPABASE_PROJECT_ID || secrets.SUPABASE_PROJECT_REF || secrets.PRODUCTION_PROJECT_ID || secrets.PRODUCTION_PROJECT_REF }}
          PROCESSING_SECRET: ${{ secrets.PROCESSING_SECRET }}
          ALLOWED_ORIGINS: ${{ secrets.ALLOWED_ORIGINS }}
          VAPID_SUBJECT: ${{ secrets.VAPID_SUBJECT }}
          VAPID_PUBLIC_KEY: ${{ secrets.VAPID_PUBLIC_KEY }}
          VAPID_PRIVATE_KEY: ${{ secrets.VAPID_PRIVATE_KEY }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          supabase secrets set --project-ref "$SUPABASE_PROJECT_ID" PROCESSING_SECRET="$PROCESSING_SECRET" ALLOWED_ORIGINS="$ALLOWED_ORIGINS" VAPID_SUBJECT="$VAPID_SUBJECT" VAPID_PUBLIC_KEY="$VAPID_PUBLIC_KEY" VAPID_PRIVATE_KEY="$VAPID_PRIVATE_KEY" CRON_SECRET="$CRON_SECRET"
          for function_name in cleanup-expired fetch-playlist process-video-task summarize-video send-push send-digests; do
            supabase functions deploy "$function_name" --project-ref "$SUPABASE_PROJECT_ID"
          done

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_VAPID_PUBLIC_KEY: ${{ secrets.VAPID_PUBLIC_KEY }}

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "${{ secrets.HOSTINGER_SSH_KEY }}" > ~/.ssh/hostinger_deploy_key
          chmod 600 ~/.ssh/hostinger_deploy_key
          printf '%s\n' "72.61.101.138 ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIMLeR9MQfoNdiEiRRot1wE6novmNpuvNHxaBE26oQj2L" > ~/.ssh/known_hosts
          chmod 600 ~/.ssh/known_hosts

      - name: Deploy dist
        run: |
          tar -C dist -czf /tmp/recaps-dist.tar.gz .
          scp -i ~/.ssh/hostinger_deploy_key -P "${HOSTINGER_SSH_PORT}" /tmp/recaps-dist.tar.gz "${HOSTINGER_SSH_USER}@${HOSTINGER_SSH_HOST}:/tmp/recaps-dist.tar.gz"
          ssh -i ~/.ssh/hostinger_deploy_key -p "${HOSTINGER_SSH_PORT}" "${HOSTINGER_SSH_USER}@${HOSTINGER_SSH_HOST}" <<'EOF'
          set -euo pipefail
          target=/var/www/recaps/current
          case "$target" in
            /var/www/recaps/current) find "$target" -mindepth 1 -maxdepth 1 -exec rm -rf -- {} + ;;
            *) echo "Refusing unsafe deploy target: $target" >&2; exit 1 ;;
          esac
          tar -xzf /tmp/recaps-dist.tar.gz -C "$target"
          rm -f /tmp/recaps-dist.tar.gz
          EOF
