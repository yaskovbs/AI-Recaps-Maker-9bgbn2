name: Deploy to Hostinger

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      HOSTINGER_SSH_HOST: ${{ secrets.HOSTINGER_SSH_HOST }}
      HOSTINGER_SSH_PORT: ${{ secrets.HOSTINGER_SSH_PORT }}
      HOSTINGER_SSH_USER: ${{ secrets.HOSTINGER_SSH_USER }}
      HOSTINGER_DEPLOY_PATH: /var/www/recaps/current/
      HOSTINGER_WORKER_PATH: /var/www/recaps/worker

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v2
        with:
          # Pinning avoids the unauthenticated "latest release" lookup and
          # makes production deployments reproducible.
          version: 2.101.0

      - name: Detect Supabase deployment mode
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_ID: ${{ secrets.SUPABASE_PROJECT_ID || secrets.SUPABASE_PROJECT_REF || secrets.PRODUCTION_PROJECT_ID || secrets.PRODUCTION_PROJECT_REF }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD || secrets.PRODUCTION_DB_PASSWORD }}
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL || secrets.SUPABASE_DATABASE_URL || secrets.DATABASE_URL }}
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          PROCESSING_SECRET: ${{ secrets.PROCESSING_SECRET }}
          ALLOWED_ORIGINS: ${{ secrets.ALLOWED_ORIGINS }}
          VAPID_SUBJECT: ${{ secrets.VAPID_SUBJECT }}
          VAPID_PUBLIC_KEY: ${{ secrets.VAPID_PUBLIC_KEY }}
          VAPID_PRIVATE_KEY: ${{ secrets.VAPID_PRIVATE_KEY }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          if [[ "$VITE_SUPABASE_URL" == *".backend.onspace.ai"* ]] && [ -z "$SUPABASE_DB_URL" ]; then
            echo "::error::The frontend uses OnSpace, but SUPABASE_DB_URL is missing. Supabase CLI project credentials may target a different database. Add the OnSpace production Postgres connection string as the SUPABASE_DB_URL repository secret."
            exit 1
          fi

          if [ -n "$SUPABASE_DB_URL" ]; then
            if [[ ! "$SUPABASE_DB_URL" =~ ^postgres(ql)?:// ]]; then
              echo "::error::SUPABASE_DB_URL is not a PostgreSQL connection URI. It must start with postgres:// or postgresql:// and include user, password, host, port, and database name. Do not use the HTTPS API URL or only the database password."
              exit 1
            fi
            echo "SUPABASE_DEPLOY_MODE=postgres" >> "$GITHUB_ENV"
            echo "Using the explicit production Postgres URL for database migrations."
          elif [ -n "$SUPABASE_ACCESS_TOKEN" ] && [ -n "$SUPABASE_PROJECT_ID" ] && [ -n "$SUPABASE_DB_PASSWORD" ]; then
            echo "SUPABASE_DEPLOY_MODE=supabase_cli" >> "$GITHUB_ENV"
            echo "Using Supabase CLI for database migrations."
          else
            echo "::error::Database deployment credentials are missing. Refusing to deploy a frontend against an unknown schema."
            echo "Add SUPABASE_DB_URL, or SUPABASE_ACCESS_TOKEN + SUPABASE_PROJECT_ID + SUPABASE_DB_PASSWORD."
            exit 1
          fi

          if [ -z "$SUPABASE_ACCESS_TOKEN" ] || [ -z "$SUPABASE_PROJECT_ID" ]; then
            echo "::error::SUPABASE_ACCESS_TOKEN and SUPABASE_PROJECT_ID are required to deploy Edge Functions."
            exit 1
          fi
          if [ -z "$PROCESSING_SECRET" ] || [ "${#PROCESSING_SECRET}" -lt 32 ] || [ -z "$ALLOWED_ORIGINS" ] || [ -z "$CRON_SECRET" ]; then
            echo "::error::PROCESSING_SECRET (32+ characters), ALLOWED_ORIGINS, and CRON_SECRET are required."
            exit 1
          fi
          if [ -z "$VAPID_SUBJECT" ] || [ -z "$VAPID_PUBLIC_KEY" ] || [ -z "$VAPID_PRIVATE_KEY" ]; then
            echo "::error::VAPID_SUBJECT, VAPID_PUBLIC_KEY, and VAPID_PRIVATE_KEY are required for push notifications."
            exit 1
          fi
          echo "SUPABASE_FUNCTIONS_ENABLED=true" >> "$GITHUB_ENV"

      - name: Push Supabase migrations with CLI
        if: env.SUPABASE_DEPLOY_MODE == 'supabase_cli'
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_ID: ${{ secrets.SUPABASE_PROJECT_ID || secrets.SUPABASE_PROJECT_REF || secrets.PRODUCTION_PROJECT_ID || secrets.PRODUCTION_PROJECT_REF }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD || secrets.PRODUCTION_DB_PASSWORD }}
        run: |
          supabase link --project-ref "$SUPABASE_PROJECT_ID"
          supabase db push

      - name: Push Supabase migrations with Postgres URL
        if: env.SUPABASE_DEPLOY_MODE == 'postgres'
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL || secrets.SUPABASE_DATABASE_URL || secrets.DATABASE_URL }}
        run: |
          supabase db push --db-url "$SUPABASE_DB_URL"

      - name: Verify deployed application schema
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
        run: |
          node <<'NODE'
          const baseUrl = process.env.VITE_SUPABASE_URL;
          const anonKey = process.env.VITE_SUPABASE_ANON_KEY;
          if (!baseUrl || !anonKey) {
            console.error('VITE_SUPABASE_URL and VITE_SUPABASE_ANON_KEY are required for schema verification.');
            process.exit(1);
          }

          const requiredTables = [
            'video_tasks', 'task_logs', 'jobs', 'youtube_learning_settings',
          ];
          const headers = { apikey: anonKey, Authorization: `Bearer ${anonKey}` };
          const failures = [];

          // Validate the project/key pair against Auth first. A table may
          // intentionally reject anon SELECT through grants or RLS, which is
          // an authorization result and must not be reported as a bad key.
          const authResponse = await fetch(`${baseUrl}/auth/v1/settings`, {
            headers: { apikey: anonKey },
          });
          if (authResponse.status === 401 || authResponse.status === 403) {
            console.error(`Schema verification could not authenticate to ${new URL(baseUrl).host}.`);
            console.error('VITE_SUPABASE_ANON_KEY must be copied from the same project as VITE_SUPABASE_URL, without quotes or surrounding whitespace.');
            console.error(`Backend response: HTTP ${authResponse.status} ${(await authResponse.text()).slice(0, 200)}`);
            process.exit(1);
          }
          if (!authResponse.ok) {
            console.error(`Could not verify Supabase Auth settings: HTTP ${authResponse.status} ${(await authResponse.text()).slice(0, 200)}`);
            process.exit(1);
          }

          for (const table of requiredTables) {
            const response = await fetch(`${baseUrl}/rest/v1/${table}?select=*&limit=0`, { headers });
            if (!response.ok) {
              failures.push(`${table}: HTTP ${response.status} ${(await response.text()).slice(0, 200)}`);
            }
          }

          if (failures.length) {
            console.error('The frontend backend is missing required schema objects. Migration credentials may target a different database:');
            failures.forEach(failure => console.error(`- ${failure}`));
            process.exit(1);
          }
          console.log('Verified required tables on the backend used by the frontend.');
          NODE

      - name: Deploy Supabase Edge Functions
        if: env.SUPABASE_FUNCTIONS_ENABLED == 'true'
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_ID: ${{ secrets.SUPABASE_PROJECT_ID || secrets.SUPABASE_PROJECT_REF || secrets.PRODUCTION_PROJECT_ID || secrets.PRODUCTION_PROJECT_REF }}
          PROCESSING_SECRET: ${{ secrets.PROCESSING_SECRET }}
          ALLOWED_ORIGINS: ${{ secrets.ALLOWED_ORIGINS }}
          VAPID_SUBJECT: ${{ secrets.VAPID_SUBJECT }}
          VAPID_PUBLIC_KEY: ${{ secrets.VAPID_PUBLIC_KEY }}
          VAPID_PRIVATE_KEY: ${{ secrets.VAPID_PRIVATE_KEY }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          supabase secrets set --project-ref "$SUPABASE_PROJECT_ID" PROCESSING_SECRET="$PROCESSING_SECRET" ALLOWED_ORIGINS="$ALLOWED_ORIGINS" VAPID_SUBJECT="$VAPID_SUBJECT" VAPID_PUBLIC_KEY="$VAPID_PUBLIC_KEY" VAPID_PRIVATE_KEY="$VAPID_PRIVATE_KEY" CRON_SECRET="$CRON_SECRET"
          for function_name in cleanup-expired fetch-playlist process-video-task summarize-video send-push send-digests; do
            supabase functions deploy "$function_name" --project-ref "$SUPABASE_PROJECT_ID"
          done

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify application
        run: npm run verify

      - name: Build
        run: npm run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_VAPID_PUBLIC_KEY: ${{ secrets.VAPID_PUBLIC_KEY }}

      - name: Prepare processing worker bundle
        env:
          WORKER_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          WORKER_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          WORKER_PROCESSING_SECRET: ${{ secrets.PROCESSING_SECRET }}
          WORKER_CRON_SECRET: ${{ secrets.CRON_SECRET }}
          WORKER_YOUTUBE_COOKIES_B64: ${{ secrets.YOUTUBE_COOKIES_B64 }}
        run: |
          set -euo pipefail
          if [ -z "$WORKER_SUPABASE_URL" ] || [ -z "$WORKER_SERVICE_ROLE_KEY" ] || [ -z "$WORKER_PROCESSING_SECRET" ] || [ -z "$WORKER_CRON_SECRET" ]; then
            echo "::error::VITE_SUPABASE_URL, SUPABASE_SERVICE_ROLE_KEY, PROCESSING_SECRET, and CRON_SECRET are required for the production runtime."
            exit 1
          fi
          if [ "${#WORKER_PROCESSING_SECRET}" -lt 32 ]; then
            echo "::error::PROCESSING_SECRET must contain at least 32 characters."
            exit 1
          fi

          tar -czf /tmp/recaps-worker.tar.gz \
            -C worker Dockerfile docker-compose.yml entrypoint.sh requirements.txt processor.py \
            -C ../deploy/server run-maintenance.sh
          umask 077
          {
            printf 'SUPABASE_URL=%s\n' "$WORKER_SUPABASE_URL"
            printf 'SUPABASE_SERVICE_ROLE_KEY=%s\n' "$WORKER_SERVICE_ROLE_KEY"
            printf 'PROCESSING_SECRET=%s\n' "$WORKER_PROCESSING_SECRET"
            printf 'CRON_SECRET=%s\n' "$WORKER_CRON_SECRET"
            printf 'YOUTUBE_COOKIES_B64=%s\n' "$WORKER_YOUTUBE_COOKIES_B64"
            printf 'WORKER_ID=recaps-worker-1\n'
            printf 'POLL_SECONDS=3\n'
            printf 'TASK_TIMEOUT_SECONDS=7200\n'
            printf 'MAX_VIDEO_DURATION_SECONDS=14400\n'
            printf 'MAX_SOURCE_BYTES=4294967296\n'
            printf 'WHISPER_MODEL=small\n'
            printf 'WHISPER_DEVICE=cpu\n'
            printf 'WHISPER_COMPUTE_TYPE=int8\n'
          } > /tmp/recaps-worker.env

      - name: Configure SSH
        env:
          HOSTINGER_SSH_KEY: ${{ secrets.HOSTINGER_SSH_KEY }}
          HOSTINGER_SSH_KEY_B64: ${{ secrets.HOSTINGER_SSH_KEY_B64 }}
          HOSTINGER_SSH_KNOWN_HOSTS: ${{ secrets.HOSTINGER_SSH_KNOWN_HOSTS }}
        run: |
          set -euo pipefail
          if [ -z "$HOSTINGER_SSH_HOST" ] || [ -z "$HOSTINGER_SSH_PORT" ] || [ -z "$HOSTINGER_SSH_USER" ] || { [ -z "$HOSTINGER_SSH_KEY" ] && [ -z "$HOSTINGER_SSH_KEY_B64" ]; }; then
            echo "::error::HOSTINGER_SSH_HOST, HOSTINGER_SSH_PORT, HOSTINGER_SSH_USER, and either HOSTINGER_SSH_KEY or HOSTINGER_SSH_KEY_B64 must be configured."
            exit 1
          fi
          if [[ ! "$HOSTINGER_SSH_PORT" =~ ^[0-9]+$ ]] || [ "$HOSTINGER_SSH_PORT" -lt 1 ] || [ "$HOSTINGER_SSH_PORT" -gt 65535 ]; then
            echo "::error::HOSTINGER_SSH_PORT must be a number between 1 and 65535."
            exit 1
          fi
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh

          # GitHub secrets are often pasted with Windows CRLF endings. A
          # base64 secret is also supported because it avoids multiline
          # formatting damage in repository settings.
          if [ -n "$HOSTINGER_SSH_KEY_B64" ]; then
            if ! printf '%s' "$HOSTINGER_SSH_KEY_B64" | tr -d '[:space:]' | base64 --decode > ~/.ssh/hostinger_deploy_key; then
              echo "::error::HOSTINGER_SSH_KEY_B64 is not valid base64. Recreate it from the complete unencrypted private key."
              exit 1
            fi
          else
            printf '%s\n' "$HOSTINGER_SSH_KEY" | tr -d '\r' > ~/.ssh/hostinger_deploy_key
          fi
          chmod 600 ~/.ssh/hostinger_deploy_key

          first_line="$(head -n 1 ~/.ssh/hostinger_deploy_key)"
          case "$first_line" in
            "-----BEGIN OPENSSH PRIVATE KEY-----"|"-----BEGIN RSA PRIVATE KEY-----"|"-----BEGIN EC PRIVATE KEY-----") ;;
            "ssh-"*)
              echo "::error::The configured SSH key is a public key. Store the complete private key in HOSTINGER_SSH_KEY (or its base64 form in HOSTINGER_SSH_KEY_B64)."
              exit 1
              ;;
            *)
              echo "::error::The configured SSH key has an invalid or damaged private-key header."
              exit 1
              ;;
          esac
          if ! ssh-keygen -y -f ~/.ssh/hostinger_deploy_key >/dev/null 2>&1; then
            echo "::error::The SSH private key cannot be parsed without a passphrase. Use the complete unencrypted deployment private key and preserve all BEGIN/END lines."
            exit 1
          fi

          if [ -n "$HOSTINGER_SSH_KNOWN_HOSTS" ]; then
            printf '%s\n' "$HOSTINGER_SSH_KNOWN_HOSTS" > ~/.ssh/known_hosts
          elif [ "$HOSTINGER_SSH_HOST" = "72.61.101.138" ]; then
            printf '%s\n' "72.61.101.138 ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIMLeR9MQfoNdiEiRRot1wE6novmNpuvNHxaBE26oQj2L" > ~/.ssh/known_hosts
          else
            echo "::error::HOSTINGER_SSH_KNOWN_HOSTS is required when deploying to a host other than the pinned production server."
            exit 1
          fi
          chmod 600 ~/.ssh/known_hosts

      - name: Check Hostinger SSH connectivity
        run: |
          for attempt in 1 2 3; do
            if timeout 15 bash -c "</dev/tcp/${HOSTINGER_SSH_HOST}/${HOSTINGER_SSH_PORT}"; then
              echo "Hostinger SSH endpoint is reachable."
              exit 0
            fi
            echo "SSH connectivity attempt ${attempt}/3 failed."
            sleep 5
          done
          echo "::error::Cannot reach ${HOSTINGER_SSH_HOST}:${HOSTINGER_SSH_PORT}. Confirm the Hostinger SSH host and port, enable SSH access, and check whether the server firewall permits GitHub-hosted runners."
          exit 1

      - name: Deploy frontend and processing worker
        run: |
          set -euo pipefail
          tar -C dist -czf /tmp/recaps-dist.tar.gz .
          scp -o ConnectTimeout=20 -o ServerAliveInterval=10 -o ServerAliveCountMax=3 -i ~/.ssh/hostinger_deploy_key -P "${HOSTINGER_SSH_PORT}" \
            -o BatchMode=yes -o IdentitiesOnly=yes \
            /tmp/recaps-dist.tar.gz /tmp/recaps-worker.tar.gz \
            "${HOSTINGER_SSH_USER}@${HOSTINGER_SSH_HOST}:/tmp/"
          ssh -o ConnectTimeout=20 -o BatchMode=yes -o IdentitiesOnly=yes -i ~/.ssh/hostinger_deploy_key -p "${HOSTINGER_SSH_PORT}" \
            "${HOSTINGER_SSH_USER}@${HOSTINGER_SSH_HOST}" \
            'umask 077; cat > /tmp/recaps-worker.env' < /tmp/recaps-worker.env
          ssh -o ConnectTimeout=20 -o ServerAliveInterval=10 -o ServerAliveCountMax=3 -o BatchMode=yes -o IdentitiesOnly=yes -i ~/.ssh/hostinger_deploy_key -p "${HOSTINGER_SSH_PORT}" "${HOSTINGER_SSH_USER}@${HOSTINGER_SSH_HOST}" <<'EOF'
          set -euo pipefail

          frontend_target=/var/www/recaps/current
          worker_target=/var/www/recaps/worker
          case "$frontend_target:$worker_target" in
            /var/www/recaps/current:/var/www/recaps/worker) ;;
            *) echo "Refusing unsafe deployment targets" >&2; exit 1 ;;
          esac

          if [ "$(id -u)" -eq 0 ]; then
            SUDO=""
          elif command -v sudo >/dev/null 2>&1 && sudo -n true 2>/dev/null; then
            SUDO="sudo"
          else
            echo "The deployment user needs root access or passwordless sudo to provision Docker and /var/www/recaps." >&2
            exit 1
          fi

          # Provision the container runtime on a fresh Ubuntu/Debian server.
          if ! command -v docker >/dev/null 2>&1; then
            command -v apt-get >/dev/null 2>&1 || { echo "Docker is missing and this server does not use apt-get." >&2; exit 1; }
            $SUDO apt-get update
            $SUDO apt-get install -y docker.io
            $SUDO systemctl enable --now docker
          fi
          command -v curl >/dev/null 2>&1 || { $SUDO apt-get update; $SUDO apt-get install -y curl; }
          if ! command -v cron >/dev/null 2>&1 && ! command -v crond >/dev/null 2>&1; then
            $SUDO apt-get update
            $SUDO apt-get install -y cron
          fi
          if ! docker compose version >/dev/null 2>&1; then
            $SUDO apt-get update
            $SUDO apt-get install -y docker-compose-v2 || $SUDO apt-get install -y docker-compose-plugin
          fi

          $SUDO install -d -m 0755 "$frontend_target" "$worker_target"
          $SUDO find "$frontend_target" -mindepth 1 -maxdepth 1 -exec rm -rf -- {} +
          $SUDO tar -xzf /tmp/recaps-dist.tar.gz -C "$frontend_target"

          # Worker secrets live outside the public web root with root-only
          # permissions. Compose recreates the service only when required.
          $SUDO tar -xzf /tmp/recaps-worker.tar.gz -C "$worker_target"
          $SUDO install -m 0600 /tmp/recaps-worker.env "$worker_target/.env"
          $SUDO chmod 0755 "$worker_target/run-maintenance.sh"
          cd "$worker_target"
          $SUDO docker compose up -d --build --remove-orphans

          container_id="$($SUDO docker compose ps -q processor)"
          [ -n "$container_id" ] || { echo "Processing worker container was not created." >&2; exit 1; }
          for attempt in $(seq 1 30); do
            state="$($SUDO docker inspect --format '{{.State.Status}}' "$container_id")"
            if [ "$state" = "running" ] && $SUDO docker logs "$container_id" 2>&1 | grep -q 'recaps-worker-1 ready'; then
              echo "Processing worker is running and polling the queue."
              break
            fi
            if [ "$state" = "exited" ] || [ "$state" = "dead" ]; then
              $SUDO docker logs --tail 100 "$container_id" >&2 || true
              exit 1
            fi
            if [ "$attempt" -eq 30 ]; then
              $SUDO docker logs --tail 100 "$container_id" >&2 || true
              echo "Processing worker did not become ready in time." >&2
              exit 1
            fi
            sleep 2
          done

          $SUDO docker compose exec -T --user worker processor sh -c \
            'test -w "$HF_HOME" && touch "$HF_HOME/.write-test" && rm "$HF_HOME/.write-test"' \
            || { echo "Whisper model cache is not writable by the worker user." >&2; exit 1; }
          echo "Verified that the Whisper model cache is writable."

          test -s "$frontend_target/index.html" || { echo "Frontend index.html is missing." >&2; exit 1; }

          # Periodic cleanup and weekly digest delivery. The secret remains in
          # the root-only worker environment rather than the crontab.
          printf '%s\n' \
            '17 * * * * root /var/www/recaps/worker/run-maintenance.sh cleanup-expired >> /var/log/recaps-maintenance.log 2>&1' \
            '30 8 * * 1 root /var/www/recaps/worker/run-maintenance.sh send-digests >> /var/log/recaps-maintenance.log 2>&1' \
            | $SUDO tee /etc/cron.d/recaps-maintenance >/dev/null
          $SUDO chmod 0644 /etc/cron.d/recaps-maintenance
          if command -v systemctl >/dev/null 2>&1; then
            $SUDO systemctl enable --now cron 2>/dev/null || $SUDO systemctl enable --now crond 2>/dev/null || true
          fi
          rm -f /tmp/recaps-dist.tar.gz /tmp/recaps-worker.tar.gz /tmp/recaps-worker.env
          EOF

      - name: Verify production website
        env:
          PRODUCTION_URL: ${{ secrets.PRODUCTION_URL }}
        run: |
          set -euo pipefail
          url="${PRODUCTION_URL:-https://making-a-recap-with-ai.com}"
          response_file="$(mktemp)"
          trap 'rm -f "$response_file"' EXIT
          for attempt in 1 2 3; do
            http_code="$(curl --silent --show-error --location \
              --connect-timeout 10 --max-time 30 \
              --output "$response_file" --write-out '%{http_code}' "$url" || true)"

            if [ "$http_code" = "200" ] \
              && grep -Fq '<title>AI Recaps Maker' "$response_file" \
              && grep -Fq 'id="root"' "$response_file" \
              && grep -Fq 'AI Recaps Maker is an AI-assisted video recap creation application.' "$response_file"; then
              echo "Production website is serving the deployed application."
              exit 0
            fi

            echo "Production verification attempt ${attempt}/3 failed (HTTP ${http_code:-unavailable})."
            sleep 5
          done
          echo "::error::Production website verification failed for $url. Expected HTTP 200 and the current AI Recaps Maker homepage markers."
          exit 1
